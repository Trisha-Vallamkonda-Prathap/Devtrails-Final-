name: gigshield
description: AI-powered parametric income insurance for gig delivery workers
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.2.0
  crypto: ^3.0.3
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  google_fonts: ^6.1.0
  pin_code_fields: ^8.0.1
  image_picker: ^1.1.2
  percent_indicator: ^4.2.3
  google_maps_flutter: ^2.6.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
